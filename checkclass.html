<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkclass</title>
    <link rel="stylesheet" href="checkclass.css">
</head>
<body>
    <input type="radio" id="1" name="1">
    <label for="1">Java</label>
    <input type="radio" id="2" name="1">
    <label for="2">CSS</label>
    <input type="checkbox" id="3" name="2">
    <label for="3">Yes</label>
    <input type="checkbox" id="4" name="2">
    <label for="4">No</label>
</body>
</html>
